name: Build Windows Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 升级 Flutter 到 3.22.3（自带 Dart 3.4.3，满足 shelf ^3.4.0 要求）
      - name: Setup Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # 自动修复 intl 版本，适配 Flutter 3.22 内置的 0.19.0
      - name: Fix intl version
        run: |
          cd simple_live_app
          (Get-Content pubspec.yaml) -replace 'intl:\s*\^0\.20\.2','intl: 0.19.0' | Set-Content pubspec.yaml

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get --no-example

      - name: Build Windows
        run: |
          cd simple_live_app
          flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-Windows
          path: simple_live_app/build/windows/runner/Release/
